name: CI — Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes unitarios
        run: mvn test --no-transfer-progress
        working-directory: movie-booking-api

      - name: Publicar resultado dos testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: movie-booking-api/target/surefire-reports/