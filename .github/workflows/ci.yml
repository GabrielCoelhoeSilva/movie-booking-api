name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: movie-booking-api

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes unitários
        run: mvn test --no-transfer-progress

      - name: Publicar resultados dos testes unitários
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: movie-booking-api/target/surefire-reports/

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    defaults:
      run:
        working-directory: movie-booking-api

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes de integração
        run: mvn failsafe:integration-test failsafe:verify --no-transfer-progress

      - name: Publicar resultados dos testes de integração
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: movie-booking-api/target/failsafe-reports/