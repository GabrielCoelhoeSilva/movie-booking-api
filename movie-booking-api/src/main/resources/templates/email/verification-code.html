<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333333;
            font-size: 24px;
        }
        .code-box {
            text-align: center;
            background-color: #f0f4ff;
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
        }
        .code {
            font-size: 36px;
            font-weight: bold;
            color: #4a6cf7;
            letter-spacing: 8px;
        }
        .message {
            color: #666666;
            font-size: 14px;
            line-height: 1.6;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999999;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 Movie Booking</h1>
    </div>

    <p class="message">Olá, <strong th:text="${name}">Usuário</strong>!</p>

    <p class="message">
        Obrigado por se cadastrar. Use o código abaixo para verificar seu email:
    </p>

    <div class="code-box">
        <div class="code" th:text="${code}">000000</div>
    </div>

    <p class="message">
        ⏱ Esse código expira em <strong>15 minutos</strong>.
    </p>

    <p class="message">
        Se você não solicitou esse código, ignore esse email.
    </p>

    <div class="footer">
        <p>Movie Booking API © 2026</p>
    </div>
</div>
</body>
</html>
