spring.application.name=movie-booking-api

# Banco H2 em memoria para testes
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Servidor
server.port=8082

# JWT (valores fictícios apenas para testes)
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits
jwt.expiration=86400000

# Cache simples (sem Redis nos testes)
spring.cache.type=none

# Email (desabilitado nos testes)
spring.mail.host=
spring.mail.port=0
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Redis (desabilitado nos testes)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator
management.endpoints.web.exposure.include=health