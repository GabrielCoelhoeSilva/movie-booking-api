services:

  # ─── Banco de dados ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cinema_booking_db
    environment:
      POSTGRES_DB: cinema_booking_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d cinema_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moviebooking-network

  # ─── Redis ────────────────────────────────────────
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - moviebooking-network

  # ─── API ──────────────────────────────────────────
  api:
    build: .
    container_name: moviebooking_api
    ports:
      - "${SERVER_PORT}:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cinema_booking_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SERVER_PORT: ${SERVER_PORT}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GMAIL_USERNAME: ${GMAIL_USERNAME}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - moviebooking-network

  # ─── Prometheus ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
    networks:
      - moviebooking-network

  # ─── Grafana ──────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - moviebooking-network

volumes:
  postgres_data:

networks:
  moviebooking-network:
    driver: bridge