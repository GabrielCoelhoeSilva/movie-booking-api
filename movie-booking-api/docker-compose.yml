services:

  # ─── Banco de dados ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cinema_booking_db
    environment:
      POSTGRES_DB: cinema_booking_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d cinema_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API ──────────────────────────────────────────
  api:
    build: .
    container_name: moviebooking_api
    ports:
      - "${SERVER_PORT}:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cinema_booking_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: